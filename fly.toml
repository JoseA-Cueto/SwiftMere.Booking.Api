app = "swiftmere-booking-api"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  ASPNETCORE_URLS = "http://+:8080"
  Booking__TimeZone = "Europe/Madrid"
  Booking__DurationMinutes = "30"
  Booking__IntervalMinutes = "30"
  Booking__LookaheadDays = "14"
  Booking__MinNoticeMinutes = "120"
  Booking__WorkdayStart = "08:00"
  Booking__WorkdayEnd = "24:00"
  Cors__AllowedOrigins__0 = "https://swiftmere.com"
  Cors__AllowedOrigins__1 = "https://swift-mere-landing.vercel.app"
  Cors__AllowedOrigins__2 = "http://127.0.0.1:5173"
  Cors__AllowedOrigins__3 = "http://localhost:5173"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
